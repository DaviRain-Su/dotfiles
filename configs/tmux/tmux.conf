# Tmux 配置 - 适合 AI Agent 开发
# 安装: ln -sf ~/dotfiles/configs/tmux/tmux.conf ~/.tmux.conf

# ============================================
# 基础设置
# ============================================

# 使用 Ctrl+a 代替 Ctrl+b（更容易按）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 鼠标支持
set -g mouse on

# 使用 256 色
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 窗口编号从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 自动重新编号窗口
set -g renumber-windows on

# 历史行数
set -g history-limit 100000

# 不显示活动通知
set -g visual-activity off
set -g visual-bell off

# ============================================
# 快捷键优化（类似 Ghostty）
# ============================================

# 垂直分屏 (Cmd+D 风格)
bind | split-window -h -c "#{pane_current_path}"
bind \ split-window -h -c "#{pane_current_path}"

# 水平分屏 (Cmd+Shift+D 风格)
bind - split-window -v -c "#{pane_current_path}"

# 新建窗口 (Cmd+T 风格)
bind c new-window -c "#{pane_current_path}"

# 关闭窗口/面板 (Cmd+W 风格)
bind w kill-pane
bind q kill-window

# 导航 (vim 风格)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 快速切换窗口 (Cmd+1..9 风格)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# ============================================
# 状态栏配置（美观）
# ============================================

# 状态栏颜色
colour_bg="#1a1b26"
colour_fg="#a9b1d6"
colour_green="#73daca"
colour_blue="#7aa2f7"
colour_magenta="#bb9af7"

set -g status-style bg=$colour_bg,fg=$colour_fg

# 状态栏左侧：会话名
set -g status-left "#[fg=$colour_green,bold]#S#[default] "
set -g status-left-length 50

# 状态栏右侧：时间
set -g status-right "#[fg=$colour_blue]%H:%M#[default]"
set -g status-right-length 50

# 窗口列表格式
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=$colour_magenta,bold] #I:#W #[default]"
setw -g window-status-current-style bg=$colour_bg

# 状态栏位置
set -g status-position bottom
set -g status-interval 5

# ============================================
# 复制模式（类似 Vim）
# ============================================

setw -g mode-keys vi

# 进入复制模式: Ctrl+a [
# 选择: v (visual mode)
# 复制: y (yank)
# 粘贴: Ctrl+a ]

# 使用系统剪贴板（macOS）
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ============================================
# AI 开发专用
# ============================================

# 快速创建命名会话
# 用法: tmux new -s project-name

# 快速 attach 快捷键
bind a choose-tree -s  # 选择会话

# 重命名会话
bind r command-prompt -I "#S" "rename-session '%%'"

# 保持当前目录创建窗口
bind c new-window -c "#{pane_current_path}"

# ============================================
# 其他优化
# ============================================

# 更快的响应时间
set -s escape-time 0

# 活动窗口监控
setw -g monitor-activity on

# 聚焦事件（vim 需要）
set -g focus-events on

# 自动保存和恢复（需要插件）
# 暂不启用，保持简单
