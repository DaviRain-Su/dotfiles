# Pi Coding Agent 配置
# 默认使用 Kimi 模型

# 模型配置
model: k2p5
provider: kimi-coding
base_url: https://api.kimi.com/coding

# API Key 从环境变量读取: KIMI_API_KEY

# 扩展配置
extensions:
  - npm:pi-messenger
  - npm:pi-subagents

# 工具配置
tools:
  - read
  - write
  - bash
  - grep
  - find
  - ls

# 提示词配置
system_prompt: |
  你是一个专业的编程助手，使用 Kimi k2.5 模型。
  
  可用的子代理 (通过 pi-subagents):
  - /run scout - 代码探索
  - /run planner - 架构设计
  - /run worker - 代码实现
  - /run reviewer - 代码审查
  
  团队协作 (通过 pi-messenger):
  - pi_messenger({ action: "join" }) - 加入网络
  - /messenger - 打开聊天界面

# 行为配置
behavior:
  auto_confirm: false
  show_token_usage: true
  stream_output: true
