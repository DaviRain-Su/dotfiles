# Starship 配置
# 紧凑简洁的终端提示符

command_timeout = 2000
add_newline = false

format = """$directory$git_branch$git_status$cmd_duration$time $character"""

[directory]
format = "[$path]($style) "
truncation_length = 10
truncation_symbol = "…/"
style = "cyan bold"
home_symbol = "🏠 ~"
read_only = " "
read_only_style = "red"

[git_branch]
symbol = ""
format = "[$symbol$branch]($style)"
style = "purple bold"

[git_status]
format = '([$all_status]($style))'
style = "yellow"
conflicted = "✕"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕${count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "→${count}"
deleted = "✗${count}"

[cmd_duration]
min_time = 2000
format = " ⏱️ ${duration}"
style = "yellow"
show_notifications = false

[time]
disabled = false
format = " 🕐 ${time}"
time_format = "%H:%M"
style = "bright-black"

[character]
success_symbol = "[❯](green bold)"
error_symbol = "[❯](red bold)"
vimcmd_symbol = "[❮](green bold)"
vimcmd_replace_one_symbol = "[❮](purple bold)"
vimcmd_replace_symbol = "[❮](purple bold)"
vimcmd_visual_symbol = "[❮](yellow bold)"

